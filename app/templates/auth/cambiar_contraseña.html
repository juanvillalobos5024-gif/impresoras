{% extends "base.html" %}

{% block title %}Cambiar Contraseña - Sistema TI{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-key me-2"></i>Cambiar Contraseña</h5>
                </div>
                <div class="card-body p-4">
                    <form method="POST" novalidate>
                        <div class="mb-3">
                            <label for="contraseña_actual" class="form-label">Contraseña Actual</label>
                            <input type="password" class="form-control" id="contraseña_actual" 
                                   name="contraseña_actual" required>
                        </div>

                        <div class="mb-3">
                            <label for="contraseña_nueva" class="form-label">Nueva Contraseña</label>
                            <input type="password" class="form-control" id="contraseña_nueva" 
                                   name="contraseña_nueva" required>
                            <small class="text-muted">Mínimo 6 caracteres</small>
                        </div>

                        <div class="mb-4">
                            <label for="contraseña_confirmar" class="form-label">Confirmar Nueva Contraseña</label>
                            <input type="password" class="form-control" id="contraseña_confirmar" 
                                   name="contraseña_confirmar" required>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="/" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>Cambiar Contraseña
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
