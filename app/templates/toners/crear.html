{% extends "base.html" %}

{% block title %}Instalar Tóner - Sistema TI{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1 class="h3 fw-bold">
            <i class="fas fa-plus-circle me-2"></i>Instalar Tóner
        </h1>
    </div>
</div>

<div class="row">
    <div class="col-lg-6 mx-auto">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">Instalación de Tóner</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST" novalidate>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Impresora *</label>
                        <select class="form-control" name="impresora_id" required>
                            <option value="">-- Seleccionar impresora --</option>
                            {% for imp in impresoras %}
                            <option value="{{ imp.id }}">{{ imp.codigo_interno }} - {{ imp.marca }} {{ imp.modelo }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Referencia del Tóner *</label>
                        <input type="text" class="form-control" name="referencia" placeholder="Ej: CF279A" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Fecha de Instalación *</label>
                        <input type="date" class="form-control" name="fecha_instalacion" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Contador en la Instalación *</label>
                        <input type="number" class="form-control" name="contador_instalacion" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Observaciones</label>
                        <textarea class="form-control" name="observaciones" rows="2"></textarea>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('toners.listar') }}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success btn-lg">
                            <i class="fas fa-save me-2"></i>Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
